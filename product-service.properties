server.port=8901
spring.application.name=product-service

spring.cloud.consul.host=${CONSUL_HOST:localhost}
spring.cloud.consul.port=${CONSUL_PORT:8500}
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.openfeign.micrometer.enabled=true

resilience4j.circuitbreaker.instances.stockService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.stockService.slidingWindowSize=4
resilience4j.circuitbreaker.instances.stockService.minimumNumberOfCalls=2
resilience4j.circuitbreaker.instances.stockService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.stockService.waitDurationInOpenState=20s
resilience4j.circuitbreaker.instances.stockService.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.stockService.automaticTransitionFromOpenToHalfOpenEnabled=true

management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
